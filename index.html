<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIA — Voice Command Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;600;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050507;
    --surface: #0d0d12;
    --surface2: #12121a;
    --border: rgba(255,255,255,0.07);
    --accent: #c8d8ff;
    --accent2: #7b9cff;
    --accent-glow: rgba(123,156,255,0.15);
    --text: #e8eaf2;
    --muted: #4a4d5e;
    --danger: #ff4f4f;
    --success: #4fffb0;
    --line: rgba(123,156,255,0.2);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(123,156,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(123,156,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .globe-bg {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 900px; height: 900px;
    opacity: 0.03; pointer-events: none; z-index: 0;
    animation: globe-spin 80s linear infinite;
  }
  @keyframes globe-spin {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to   { transform: translate(-50%,-50%) rotate(360deg); }
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none; z-index: 1;
  }

  .wrapper {
    position: relative; z-index: 2;
    max-width: 900px; margin: 0 auto; padding: 0 24px 80px;
  }

  header {
    display: flex; align-items: center; gap: 20px;
    padding: 52px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px; position: relative;
  }
  header::after {
    content: '';
    position: absolute; bottom: -1px; left: 0;
    width: 120px; height: 1px;
    background: var(--accent2); box-shadow: 0 0 12px var(--accent2);
  }

  .logo-wrap { position: relative; flex-shrink: 0; }
  .logo-wrap img { width: 64px; height: 64px; border-radius: 50%; display: block; }
  .logo-pulse {
    position: absolute; inset: -6px; border-radius: 50%;
    border: 1px solid rgba(123,156,255,0.3);
    animation: pulse-ring 3s ease-in-out infinite;
  }
  .logo-pulse2 {
    position: absolute; inset: -14px; border-radius: 50%;
    border: 1px solid rgba(123,156,255,0.1);
    animation: pulse-ring 3s ease-in-out infinite 0.8s;
  }
  @keyframes pulse-ring {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 0.2; transform: scale(1.05); }
  }

  .system-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--accent2);
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
  }
  .system-label::before {
    content: ''; width: 6px; height: 6px;
    background: var(--success); border-radius: 50%;
    box-shadow: 0 0 6px var(--success);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(26px, 5vw, 42px); font-weight: 900;
    letter-spacing: 2px; color: #fff; line-height: 1;
    text-shadow: 0 0 40px rgba(123,156,255,0.3);
  }
  h1 span { color: var(--accent2); }

  .header-meta {
    margin-top: 8px; font-size: 13px; color: var(--muted);
    font-family: 'Share Tech Mono', monospace; letter-spacing: 1px;
  }

  .section-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .section-header h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 3px; color: var(--accent2); text-transform: uppercase;
  }
  .section-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--line), transparent); }
  .section-count { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); }

  .voiceline-grid { display: flex; flex-direction: column; gap: 6px; }

  .vl-card {
    background: var(--surface); border: 1px solid var(--border);
    padding: 14px 18px; display: flex; align-items: center; gap: 16px;
    position: relative; overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
    cursor: default; animation: card-in 0.4s ease both;
  }
  .vl-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 2px; background: var(--accent2); opacity: 0; transition: opacity 0.2s;
  }
  .vl-card::after {
    content: ''; position: absolute; bottom: 0; right: 0;
    width: 0; height: 0; border-style: solid;
    border-width: 0 0 8px 8px;
    border-color: transparent transparent rgba(123,156,255,0.15) transparent;
  }
  .vl-card:hover { border-color: rgba(123,156,255,0.25); background: var(--surface2); }
  .vl-card:hover::before { opacity: 1; }
  .vl-card.playing { border-color: rgba(123,156,255,0.4); background: var(--surface2); }
  .vl-card.playing::before { opacity: 1; box-shadow: 0 0 8px var(--accent2); }
  .vl-card.error .play-btn { border-color: rgba(255,79,79,0.4); }
  .vl-card.error .vl-sub { color: var(--danger); }

  @keyframes card-in {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .vl-card:nth-child(1) { animation-delay: 0.00s; }
  .vl-card:nth-child(2) { animation-delay: 0.06s; }
  .vl-card:nth-child(3) { animation-delay: 0.12s; }
  .vl-card:nth-child(4) { animation-delay: 0.18s; }
  .vl-card:nth-child(5) { animation-delay: 0.24s; }

  .vl-index {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--muted); width: 20px; text-align: right; flex-shrink: 0;
  }

  .play-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(123,156,255,0.3); background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .play-btn::before {
    content: ''; position: absolute; inset: 0;
    background: var(--accent-glow); border-radius: 50%; opacity: 0; transition: opacity 0.2s;
  }
  .play-btn:hover::before { opacity: 1; }
  .play-btn:hover { border-color: var(--accent2); box-shadow: 0 0 12px rgba(123,156,255,0.3); }
  .play-btn svg { position: relative; z-index: 1; transition: transform 0.15s; }
  .play-btn:hover svg { transform: scale(1.1); }
  .playing .play-btn { border-color: var(--accent2); box-shadow: 0 0 16px rgba(123,156,255,0.4); }

  .waveform {
    flex: 1; height: 32px;
    display: flex; align-items: center; gap: 2px; cursor: pointer;
  }
  .waveform-bar {
    flex-shrink: 0; width: 2px;
    background: rgba(123,156,255,0.25); border-radius: 1px; transition: background 0.1s;
  }
  .waveform-bar.played { background: var(--accent2); }
  .waveform-bar.head { background: #fff; box-shadow: 0 0 4px #fff; }
  .playing .waveform-bar:not(.played) { animation: wave-idle 1.2s ease-in-out infinite; }
  @keyframes wave-idle {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.45; }
  }

  .vl-info { min-width: 0; }
  .vl-label {
    font-size: 15px; font-weight: 600; color: var(--text);
    letter-spacing: 0.5px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; line-height: 1.2;
  }
  .vl-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 1px;
  }

  .vl-duration {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--muted);
    flex-shrink: 0; text-align: right; min-width: 36px;
  }
  .vl-duration .elapsed { color: var(--accent); display: none; }
  .playing .vl-duration .elapsed { display: block; }
  .playing .vl-duration .total { display: none; }

  .vol-area {
    display: flex; align-items: center; gap: 8px;
    margin-top: 16px; padding: 10px 18px;
    background: var(--surface); border: 1px solid var(--border); max-width: 280px;
  }
  .vol-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0;
  }
  input[type=range] {
    -webkit-appearance: none; height: 2px;
    background: rgba(123,156,255,0.2); border-radius: 1px; flex: 1; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent2); box-shadow: 0 0 6px var(--accent2); cursor: pointer;
  }

  footer {
    border-top: 1px solid var(--border); padding-top: 24px; margin-top: 60px;
    display: flex; justify-content: space-between; align-items: center;
  }
  footer span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
  }
  .status-dot {
    display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    background: var(--success); box-shadow: 0 0 4px var(--success);
    margin-right: 6px; vertical-align: middle;
    animation: blink 2s ease-in-out infinite;
  }
</style>
</head>
<body>

<svg class="globe-bg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <circle cx="200" cy="200" r="190" fill="none" stroke="white" stroke-width="1"/>
  <ellipse cx="200" cy="200" rx="120" ry="190" fill="none" stroke="white" stroke-width="0.8"/>
  <ellipse cx="200" cy="200" rx="60" ry="190" fill="none" stroke="white" stroke-width="0.6"/>
  <ellipse cx="200" cy="200" rx="190" ry="60" fill="none" stroke="white" stroke-width="0.8"/>
  <ellipse cx="200" cy="200" rx="190" ry="120" fill="none" stroke="white" stroke-width="0.6"/>
  <line x1="10" y1="200" x2="390" y2="200" stroke="white" stroke-width="0.6"/>
  <line x1="200" y1="10" x2="200" y2="390" stroke="white" stroke-width="0.6"/>
</svg>

<div class="wrapper">
  <header>
    <div class="logo-wrap">
      <div class="logo-pulse"></div>
      <div class="logo-pulse2"></div>
      <img src="https://raw.githubusercontent.com/loreinfo1/dodaiainfo/refs/heads/main/assets/logo.png" alt="AIA Logo"
           onerror="this.style.display='none'; this.parentElement.innerHTML += '<div style=\'width:64px;height:64px;border-radius:50%;background:#0d0d12;border:1px solid rgba(123,156,255,0.3);display:flex;align-items:center;justify-content:center;font-family:Orbitron,sans-serif;font-size:10px;color:#7b9cff;\'>AIA</div>'">
    </div>
    <div class="header-text">
      <div class="system-label">SYSTEM ONLINE · VOICE COMMAND DATABASE</div>
      <h1>A<span>I</span>A</h1>
      <div class="header-meta">TACTICAL · COMBATICS · AUDIO ARCHIVE</div>
    </div>
  </header>

  <div class="voiceline-grid" id="grid"></div>

  <div class="vol-area">
    <span class="vol-label">VOL</span>
    <input type="range" id="vol-slider" min="0" max="100" value="80">
    <span class="vol-label" id="vol-display">80</span>
  </div>

  <footer>
    <span><span class="status-dot"></span>AIA VOICE COMMAND DATABASE</span>
    <span>REV 1.0 · CLASSIFIED</span>
  </footer>
</div>

<script>
const BASE = 'https://github.com/loreinfo1/dodaiainfo/raw/refs/heads/main/voicelines/';

const VOICELINES = [
  { label: 'Move',     file: 'move.mp3',    tag: 'ORDER' },
  { label: 'In there', file: 'inthere.mp3', tag: 'ORDER' },
];

let currentAudio = null;
let currentCard  = null;
let volume = 0.8;

function buildBars(n = 52) {
  return Array.from({ length: n }, () => 6 + Math.random() * 22);
}

function renderBars(heights) {
  return heights.map((h, i) =>
    `<div class="waveform-bar" style="height:${h}px;animation-delay:${(i*0.03).toFixed(2)}s"></div>`
  ).join('');
}

function createCard(vl, index) {
  const card = document.createElement('div');
  card.className = 'vl-card';
  card.innerHTML = `
    <span class="vl-index">${String(index + 1).padStart(2, '0')}</span>
    <button class="play-btn" aria-label="Play ${vl.label}">
      <svg width="12" height="14" viewBox="0 0 12 14" fill="none">
        <path class="play-icon" d="M1 1L11 7L1 13V1Z" fill="#7b9cff"/>
        <rect class="pause-icon" x="1" y="1" width="3" height="12" fill="#7b9cff" style="display:none"/>
        <rect class="pause-icon2" x="8" y="1" width="3" height="12" fill="#7b9cff" style="display:none"/>
      </svg>
    </button>
    <div class="waveform">${renderBars(buildBars())}</div>
    <div class="vl-info">
      <div class="vl-label">${vl.label}</div>
      <div class="vl-sub">${vl.tag}</div>
    </div>
    <div class="vl-duration">
      <span class="elapsed">0:00</span>
      <span class="total">—:——</span>
    </div>
  `;

  card.querySelector('.play-btn').addEventListener('click', () => togglePlay(card, vl));
  card.querySelector('.waveform').addEventListener('click', e => seek(e, card));
  document.getElementById('grid').appendChild(card);
}

function togglePlay(card, vl) {
  if (currentCard === card && currentAudio && !currentAudio.paused) { stopAll(); return; }
  stopAll();
  const audio = new Audio(BASE + vl.file);
  audio.volume = volume;
  currentAudio = audio;
  currentCard  = card;
  setState(card, 'playing');
  audio.addEventListener('loadedmetadata', () => {
    const d = Math.ceil(audio.duration);
    card.querySelector('.total').textContent = `${Math.floor(d/60)}:${String(d%60).padStart(2,'0')}`;
  });
  audio.play().catch(() => { setState(card, 'error'); currentAudio = null; currentCard = null; });
  audio.addEventListener('timeupdate', () => {
    updateWave(card, audio.currentTime / (audio.duration || 1));
    const e = Math.floor(audio.currentTime);
    card.querySelector('.elapsed').textContent = `${Math.floor(e/60)}:${String(e%60).padStart(2,'0')}`;
  });
  audio.addEventListener('ended', () => {
    setState(card, 'paused');
    currentAudio = null; currentCard = null;
    card.querySelectorAll('.waveform-bar').forEach(b => b.classList.remove('played','head'));
    card.querySelector('.elapsed').textContent = '0:00';
  });
}

function stopAll() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (currentCard)  { setState(currentCard, 'paused'); currentCard = null; }
}

function setState(card, state) {
  const pi = card.querySelector('.play-icon');
  const pa = card.querySelectorAll('.pause-icon, .pause-icon2');
  card.classList.toggle('playing', state === 'playing');
  if (state === 'error') card.classList.add('error');
  pi.style.display = state === 'playing' ? 'none' : 'block';
  pa.forEach(el => el.style.display = state === 'playing' ? 'block' : 'none');
}

function updateWave(card, pct) {
  const bars  = card.querySelectorAll('.waveform-bar');
  const pivot = Math.floor(pct * bars.length);
  bars.forEach((b, i) => {
    b.classList.toggle('played', i < pivot);
    b.classList.toggle('head',   i === pivot);
  });
}

function seek(e, card) {
  if (!currentAudio || currentCard !== card || !currentAudio.duration) return;
  const rect = card.querySelector('.waveform').getBoundingClientRect();
  currentAudio.currentTime = ((e.clientX - rect.left) / rect.width) * currentAudio.duration;
}

VOICELINES.forEach((vl, i) => createCard(vl, i));

const volSlider  = document.getElementById('vol-slider');
const volDisplay = document.getElementById('vol-display');
volSlider.addEventListener('input', () => {
  volume = volSlider.value / 100;
  volDisplay.textContent = volSlider.value;
  if (currentAudio) currentAudio.volume = volume;
});
</script>
</body>
</html>
